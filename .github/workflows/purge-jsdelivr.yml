name: Purge jsDelivr Cache

on:
  push:
    branches:
      - main

jobs:
  purge:
    runs-on: ubuntu-latest

    steps:
      - name: Purge jsDelivr Cache
        run: |
          echo "🧹 jsDelivr cache temizleniyor..."

          # Manifest dosyaları
          curl -s "https://purge.jsdelivr.net/gh/playtoon1/content-json@main/movies_manifest.json"
          curl -s "https://purge.jsdelivr.net/gh/playtoon1/content-json@main/series_manifest.json"
          curl -s "https://purge.jsdelivr.net/gh/playtoon1/content-json@main/featured.json"

          # Film JSON dosyaları — yeni dosya ekledikçe buraya ekle
          curl -s "https://purge.jsdelivr.net/gh/playtoon1/content-json@main/movies/movies1.json"

          # Seri JSON dosyaları — yeni dosya ekledikçe buraya ekle
          # curl -s "https://purge.jsdelivr.net/gh/playtoon1/content-json@main/series/series1.json"

          # Avatar dosyası (ayrı repo)
          curl -s "https://purge.jsdelivr.net/gh/playtoon1/playtoon_avatar@main/avatar.json"

          echo "✅ Tüm cache temizlendi!"
